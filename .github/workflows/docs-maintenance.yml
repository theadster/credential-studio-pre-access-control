name: Documentation Maintenance

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check-staleness:
    runs-on: ubuntu-latest
    name: Check for Stale Documentation
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check documentation staleness
        run: npx tsx scripts/check-docs-staleness.ts
        continue-on-error: true
      
      - name: Create issue for stale docs
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📋 Documentation Staleness Report',
              body: 'Some documentation files are past their review date. Please review and update them.',
              labels: ['documentation', 'maintenance']
            })

  validate-frontmatter:
    runs-on: ubuntu-latest
    name: Validate Documentation Frontmatter
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate frontmatter
        run: npx tsx scripts/validate-docs-frontmatter.ts

  check-links:
    runs-on: ubuntu-latest
    name: Check Documentation Links
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check internal links
        run: npx tsx scripts/check-docs-links.ts
        continue-on-error: true
      
      - name: Report broken links
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔗 Broken Documentation Links Found',
              body: 'Some documentation files contain broken internal links. Please fix them.',
              labels: ['documentation', 'bug']
            })

  generate-index:
    runs-on: ubuntu-latest
    name: Generate Documentation Index
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate documentation index
        run: npx tsx scripts/generate-docs-index.ts
      
      - name: Commit index updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/INDEX_BY_TOPIC.md docs/SEARCH_INDEX.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: update documentation index"
          git push
        continue-on-error: true
